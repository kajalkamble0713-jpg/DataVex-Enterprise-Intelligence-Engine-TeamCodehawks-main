version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: datavex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datavex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datavex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datavex-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/datavex
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/trigger-analysis
      N8N_CALLBACK_URL: http://backend:5000/api/webhook/n8n-callback
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    ports:
      - "5000:5000"

  n8n:
    image: n8nio/n8n:latest
    container_name: datavex-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: UTC
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-replace_me}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-replace_me}
      BROWSERLESS_API_KEY: ${BROWSERLESS_API_KEY:-replace_me}
      N8N_CALLBACK_URL: http://backend:5000/api/webhook/n8n-callback
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-replace_with_a_long_random_secret}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
